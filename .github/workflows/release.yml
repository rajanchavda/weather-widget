name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build and package app
        run: bash build_app.sh "$VERSION"

      - name: Compute SHA-256
        id: sha
        run: echo "value=$(shasum -a 256 WeatherOverlay.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        run: |
          cat > release_notes.md <<EOF
          ## WeatherOverlay v${VERSION}

          [Add release notes here]
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: WeatherOverlay.zip

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SHA256: ${{ steps.sha.outputs.value }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/rajanchavda/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/weatheroverlay.rb <<CASK
          cask "weatheroverlay" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/rajanchavda/weather-widget/releases/download/v#{version}/WeatherOverlay.zip"
            name "WeatherOverlay"
            desc "Ambient weather menu bar overlay for macOS"
            homepage "https://github.com/rajanchavda/weather-widget"

            app "WeatherOverlay.app"

            postflight do
              system_command "xattr",
                             args: ["-cr", "#{appdir}/WeatherOverlay.app"]
            end

            livecheck do
              url :url
              strategy :github_latest
            end
          end
          CASK

          git add Casks/weatheroverlay.rb
          git -c user.name="WeatherOverlay Bot" -c user.email="bot@weatheroverlay.app" commit -m "Update to v${VERSION}"
          git push
